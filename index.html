<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
    max-width:400px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    margin:auto;
}

h1{
    font-size:28px;
    margin-bottom:30px;
    animation:fade 2s ease;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

input{
    width:100%;
    padding:15px 60px 15px 15px;
    border:none;
    border-radius:10px;
    margin-top:20px;
    font-size:16px;
    text-align:center;
}

.mensagem{
    margin-top:15px;
    color:#aaa;
    min-height:20px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
    .senha-box{
    position:relative;
}

.olho{
    position:absolute;
    right:15px;
    
    top:0;
    bottom:0;
    margin:auto 0;
    
    width:40px;
    height:40px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:none;
    border:none;

    font-size:14px;
    font-weight:bold;

    cursor:pointer;
    color:black;
}
    
.entrar-btn{
    margin-top:20px;
    width:100%;
}
#surpresa{
    display:none;
    
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    position:fixed;
    top:0;
    left:0;
    
    width:100%;
    height:100vh;
}
</style>
</head>

<body>

<div class="container">

    <div id="inicio">
        <h1>Nem todo mundo pode entrar aqui...</h1>

        <button onclick="entrar()">
            Clique para entrar
        </button>
    </div>

    <div id="login" class="hidden">

        <h1>Digite seu nome</h1>

     <div class="senha-box">

    <input
        type="password"
        id="senha"
        placeholder="Seu nome..."
    >

    <button class="olho" onclick="mostrarSenha()">
        Ver
    </button>

</div>

<button class="entrar-btn" onclick="verificarSenha()">
    Próximo
</button>

<div class="mensagem" id="mensagem"></div>


    </div>
</div>

<div id="surpresa" class="hidden">

    <h1>Oi meu amor ❤️</h1>

    <p>
        Fiz esse site só pra você...
    </p>

</div>

</div>
</div>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const senhaCorreta = "ayla danieli amarante israel";

let tentativa = 0;

function entrar(){

    document.getElementById("inicio").classList.add("hidden");

    document.getElementById("login").classList.remove("hidden");

    document.getElementById("musica").play();
}

document.getElementById("senha").addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        verificarSenha();
    }
});

function verificarSenha(){

    const senha =
    document.getElementById("senha").value;

    const mensagem =
    document.getElementById("mensagem");

    if(senha === senhaCorreta){

        mensagem.innerHTML =
        "Parabéns amor,sabia que você acertaria...";

       document.getElementById("login").classList.add("hidden");

       setTimeout(() => { 
           document.getElementById("surpresa").style.display = "flex";
    }, 3000);
else{

        tentativa++;

        if(tentativa === 1){

            mensagem.innerHTML =
            "Digite seu nome completo em letras minúsculas.";

        }else if(tentativa === 2){

            mensagem.innerHTML =
            "Quase lá, digite seu nome futuramente...";

        }else{

            mensagem.innerHTML =
            "Parabéns, você acertou gatinha";
        }
    }
}
function mostrarSenha(){

    const input =
    document.getElementById("senha");

    if(input.type === "password"){

        input.type = "text";

    }else{

        input.type = "password";
    }
}
</script>

</body>
</html>
