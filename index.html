<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>...</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:black;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    width:90%;
    max-width:400px;
}

h1{
    font-size:28px;
    margin-bottom:30px;
    animation:fade 2s ease;
}

button{
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    margin-top:20px;
    font-size:16px;
    text-align:center;
}

.mensagem{
    margin-top:15px;
    color:#aaa;
    min-height:20px;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div id="inicio">
        <h1>Nem todo mundo pode entrar aqui...</h1>

        <button onclick="entrar()">
            Clique para entrar
        </button>
    </div>

    <div id="login" class="hidden">

        <h1>Digite seu nome</h1>

        <input
            type="password"
            id="senha"
            placeholder="Seu nome..."
        >

        <div class="mensagem" id="mensagem"></div>

    </div>

</div>

<audio id="musica" loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

const senhaCorreta = "ayladanieleamaranteisrael";

let tentativa = 0;

function entrar(){

    document.getElementById("inicio").classList.add("hidden");

    document.getElementById("login").classList.remove("hidden");

    document.getElementById("musica").play();
}

document.getElementById("senha").addEventListener("keypress", function(e){

    if(e.key === "Enter"){

        verificarSenha();
    }
});

function verificarSenha(){

    const senha =
    document.getElementById("senha").value;

    const mensagem =
    document.getElementById("mensagem");

    if(senha === senhaCorreta){

        mensagem.innerHTML =
        "Sabia que você descobriria...";

        setTimeout(() => {

            window.location.href = "home.html";

        }, 2000);

    }else{

        tentativa++;

        if(tentativa === 1){

            mensagem.innerHTML =
            "Digite em letras minúsculas.";

        }else if(tentativa === 2){

            mensagem.innerHTML =
            "Digite seu nome futuramente...";

        }else{

            mensagem.innerHTML =
            "Você realmente me conhece?";
        }
    }
}

</script>

</body>
</html>
